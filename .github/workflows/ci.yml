name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  checks:
    name: web
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://lemnity:lemnity@localhost:5432/lemnity?schema=public
      NEXTAUTH_SECRET: ci-secret
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json has build script
        run: |
          node -e "const p=require('./package.json'); if(!p.scripts?.build){console.error('Missing scripts.build in package.json'); process.exit(1)}"

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

# Пример: один сертификат покрывает apex, www и все одноуровневые поддомены (*.lemnity.com).
# Выпуск: scripts/issue-ssl-wildcard-lemnity.sh (DNS-01).
#
# В блок http { } основного nginx.conf добавьте (если ещё нет):
#   map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
#   }
#
# Подставьте upstream-порт PM2/next (часто 3000) и пути к fullchain/privkey после certbot.

upstream lemnity_next {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name lemnity.com www.lemnity.com *.lemnity.com;

  ssl_certificate     /etc/letsencrypt/live/lemnity-unified/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lemnity-unified/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_pass http://lemnity_next;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name lemnity.com www.lemnity.com *.lemnity.com;
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lemnity
      POSTGRES_PASSWORD: lemnity
      POSTGRES_DB: lemnity
    # 5433 на хосте: не пересекаться с локальным Postgres на 5432 (Homebrew и т.д.)
    ports:
      - "5433:5432"
    volumes:
      - lemnity_pg:/var/lib/postgresql/data
      - ./docker/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lemnity -d lemnity"]
      interval: 3s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  lemnity_pg:

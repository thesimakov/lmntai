services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lemnity
      POSTGRES_PASSWORD: lemnity
      POSTGRES_DB: lemnity
    # Проброс порта задаётся LMNTAI_PG_HOST_PORT (.env в корне репо для docker compose — не путать с .env.local).
    # Если другой контейнер уже занял 5433 (docker ps покажет 0.0.0.0:5433->…), здесь нужен другой хост-порт и тот же порт в DATABASE_URL.
    ports:
      - "${LMNTAI_PG_HOST_PORT:-5433}:5432"
    volumes:
      - lemnity_pg:/var/lib/postgresql/data
      - ./docker/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lemnity -d lemnity"]
      interval: 3s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  lemnity_pg:
